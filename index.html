<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Enes Doğanay | 14 Mayıs 2026: SEO — yeni konumlandırmayla uyumlu hale getirildi -->
  <title>Tedport — Türkiye'nin Kurumsal İş Ağı</title>
  <meta name="description" content="Doğru firmaları keşfedin, satınalma süreçlerinizi hızlandırın ve uzun vadeli çözüm ortaklıkları kurun — hepsi tek platformda. Ücretsiz üyelik." />
  <meta name="google-site-verification" content="ua03-sNf4uIDoygaSGaRL8FXMUiy9bhbp_rPffCN-4o" />
  <meta property="og:title" content="Tedport — Türkiye'nin Kurumsal İş Ağı" />
  <meta property="og:description" content="Doğru firmaları keşfedin, satınalma süreçlerinizi hızlandırın ve uzun vadeli çözüm ortaklıkları kurun — hepsi tek platformda. Ücretsiz üyelik." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://tedport.com" />
  <!-- Enes Doğanay | 2 Mayıs 2026: Faz 2 — React yüklenmeden önce tema uygula (flash önleme) -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('tedport-theme');
        var theme = saved === 'dark' || saved === 'light'
          ? saved
          : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>
  <!-- Enes Doğanay | 11 Mayıs 2026: preconnect ile Google Fonts bağlantısı önceden kurulur, font daha hızlı yüklenir -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <!-- Enes Doğanay | 11 Mayıs 2026: display=swap → display=block — ikon fontunda swap kullanmak ligature isimleri
       (dark_mode, arrow_forward vb.) yükleme öncesi ham metin olarak gösterir. block ile ikon kısa süre görünmez
       kalır (blank), bu metin gösteriminden çok daha az göze batar. -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=block"
    rel="stylesheet" />
</head>

<body>
  <!-- Enes Doğanay | 10 Nisan 2026: Email değişiklik onayında eski session'ı Vite bundle'dan ÖNCE temizle.
       Supabase JS client (detectSessionInUrl: true) başlatılırken eski token ile yeni hash token'ı
       yarışmasın diye eski auth verisi silinir. Sadece email_change hash'inde çalışır. -->
  <script>
    (function(){
      try {
        var h = window.location.hash || '';
        if (h.indexOf('type=email_change') === -1) return;
        var ls = window.localStorage;
        var ss = window.sessionStorage;
        var keys, i;
        keys = Object.keys(ls);
        for (i = 0; i < keys.length; i++) {
          if (keys[i].indexOf('sb-') === 0 || keys[i].indexOf('tedport-auth') === 0) ls.removeItem(keys[i]);
        }
        keys = Object.keys(ss);
        for (i = 0; i < keys.length; i++) {
          if (keys[i].indexOf('sb-') === 0 || keys[i].indexOf('tedport-auth') === 0) ss.removeItem(keys[i]);
        }
      } catch(e) {}
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
