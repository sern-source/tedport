<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 64" fill="none">
  <defs>
    <!-- Sadece kesişim alanının alt yarısını maskele -->
    <clipPath id="green-over">
      <rect x="33" y="34" width="20" height="30"/>
    </clipPath>
    <!-- Sadece kesişim alanının üst yarısını maskele -->
    <clipPath id="blue-over">
      <rect x="33" y="0" width="20" height="34"/>
    </clipPath>
  </defs>

  <!-- 1) Yeşil halka tam çizilir -->
  <rect x="38" y="4" width="42" height="56" rx="14" ry="14" stroke="#1a9e4a" stroke-width="8" fill="none"/>

  <!-- 2) Mavi halka tam çizilir (yeşilin üstüne) -->
  <rect x="20" y="4" width="42" height="56" rx="14" ry="14" stroke="#1d6ec1" stroke-width="8" fill="none"/>

  <!-- 3) Yeşil halkanın alt kesişim kısmı tekrar çizilir (mavinin üstüne geçer) -->
  <rect x="38" y="4" width="42" height="56" rx="14" ry="14" stroke="#1a9e4a" stroke-width="8" fill="none" clip-path="url(#green-over)"/>
</svg>
